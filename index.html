      </div>`;
    }).join('');

    const wrap = document.getElementById('result-wrap');
    wrap.innerHTML = `
      <div class="mp-result-popup" id="ncomplete-popup">
        <div class="mp-result-card" style="max-width:640px; text-align:left;">
          <div class="mp-result-name" style="text-align:center; color:#a33;">NOT COMPLETE ORDERS</div>
          <div class="mp-result-sub" style="text-align:center; margin-top:2px;">${names.length} order(s) from the last SendCloud screenshot</div>
          <div class="mp-history-list">${itemsHtml || '<div class="mp-empty">Nothing here — all orders sent.</div>'}</div>
          <button class="mp-result-ok" id="ncomplete-ok-btn">OK</button>
        </div>
      </div>`;

    const popup = document.getElementById('ncomplete-popup');
    popup.addEventListener('click', (e) => { if (e.target === popup) resetResult(); });
    document.getElementById('ncomplete-ok-btn').addEventListener('click', resetResult);

    popup.querySelectorAll('.mp-product-icon[data-context="notcomplete"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const addedAt = btn.dataset.addedAt;
        const productIdx = Number(btn.dataset.productIdx);
        btn.disabled = true;
        const result = await toggleProductNotDone(id, addedAt, productIdx);
        btn.disabled = false;
        if (result !== null) {
          const order = allOrders.find(o => String(o.id) === String(id));
          if (order) order.notDoneProducts = result.notDoneProducts;
          const line = btn.closest('.mp-product-line');
          const isRed = result.notDoneProducts.includes(productIdx);
          line.classList.toggle('mp-product-red', isRed);
          btn.textContent = isRed ? '✅' : '🤚';
          btn.classList.toggle('mp-product-tick', isRed);
          btn.classList.toggle('mp-product-hand', !isRed);
          btn.title = isRed ? 'Mark complete' : 'Mark not done';
          if (result.blueCleared) {
            if (order) order.state = 'default';
            const item = btn.closest('.mp-history-item');
            if (item) item.classList.remove('state-blue');
            loadAndRenderList(); // reflect the cleared blue on the grid too
          }
        }
      });
    });

    const searchbar = document.querySelector('.mp-wh-searchbar');
    if (searchbar) popup.style.paddingTop = searchbar.getBoundingClientRect().height + 'px';
    const kb = document.getElementById('virtual-keyboard');
    if (kb && kb.style.display !== 'none') {
      popup.style.paddingBottom = kb.getBoundingClientRect().height + 'px';
      kb.classList.add('mp-kb-blackout');
    }
    // deliberately no timer — stays open until OK is tapped
  }

  document.getElementById('btn-not-complete').addEventListener('click', showNotCompleteList);

  // ---------- SLOTS list: transform-based navigation (no native scroll) ----------
  // The viewport (#wh-list-body) has overflow:hidden and no scroll mechanism
  // at all — the actual content lives in #wh-list-inner, which is moved with
  // a CSS transform. Because there's no native scrollable element here, a
  // mouse wheel/trackpad/touch drag/keyboard has nothing to hook into in the
  // first place, which is more reliable than trying to preventDefault()
  // scroll events (some sandboxed environments ignore that). The 4 buttons
  // are the only way to move the list.
  const SCROLL_STEP_PX = 260; // "a few cards" per up/down tap
  let whScrollOffset = 0;

  function clampWhScrollOffset(offset) {
    const outer = document.getElementById('wh-list-body');
    const inner = document.getElementById('wh-list-inner');
    if (!outer || !inner) return 0;
    const maxOffset = Math.max(0, inner.scrollHeight - outer.clientHeight);
    return Math.min(Math.max(offset, 0), maxOffset);
  }

  function applyWhScrollOffset() {
    const inner = document.getElementById('wh-list-inner');
    if (!inner) return;
    whScrollOffset = clampWhScrollOffset(whScrollOffset);
    inner.style.transform = `translateY(-${whScrollOffset}px)`;
  }

  function scrollSlotsList(direction) {
    if (direction === 'top') {
      whScrollOffset = 0;
    } else if (direction === 'bottom') {
      whScrollOffset = Number.MAX_SAFE_INTEGER; // clamped down to the real max below
    } else if (direction === 'up') {
      whScrollOffset -= SCROLL_STEP_PX;
    } else if (direction === 'down') {
      whScrollOffset += SCROLL_STEP_PX;
    }
    applyWhScrollOffset();
  }

  document.getElementById('wh-scroll-top').addEventListener('click', () => scrollSlotsList('top'));
  document.getElementById('wh-scroll-up').addEventListener('click', () => scrollSlotsList('up'));
  document.getElementById('wh-scroll-down').addEventListener('click', () => scrollSlotsList('down'));
  document.getElementById('wh-scroll-bottom').addEventListener('click', () => scrollSlotsList('bottom'));

  // Belt-and-braces: also block wheel/touch/keyboard, in case a browser ever
  // introduces its own scroll affordance here — costs nothing since there's
  // no native scroll happening anyway.
  (function blockResidualScrollGestures() {
    const outer = document.getElementById('wh-list-body');
    if (!outer) return;
    outer.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
    outer.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    const scrollKeys = ['ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', 'Home', 'End', ' '];
    document.addEventListener('keydown', (e) => {
      const whView = document.getElementById('view-wh');
      if (!whView || !whView.classList.contains('active')) return;
      if (document.activeElement === scanInput) return; // typing normally
      if (scrollKeys.includes(e.key)) e.preventDefault();
    });
  })();

  // Action sheet shown on long-press: Edit / Delete / Cancel
  function showSlotActionSheet(order) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'mp-modal-overlay';
      overlay.innerHTML = `
        <div class="mp-modal-box">
          <p style="white-space:pre-wrap; font-weight:700;">${escapeHtml(order.raw)}</p>
          <div class="mp-modal-actions" style="flex-wrap:wrap;">
            <button class="mp-btn mp-btn-ghost" id="sheet-cancel">Cancel</button>
            <button class="mp-btn mp-btn-primary" id="sheet-edit">Edit</button>
            <button class="mp-btn" id="sheet-delete" style="background:#a33; color:#fff; border:none;">Delete</button>
          </div>
        </div>`;
      root.appendChild(overlay);
      overlay.querySelector('#sheet-cancel').addEventListener('click', () => { overlay.remove(); resolve(null); });
      overlay.querySelector('#sheet-edit').addEventListener('click', () => { overlay.remove(); resolve('edit'); });
      overlay.querySelector('#sheet-delete').addEventListener('click', () => { overlay.remove(); resolve('delete'); });
    });
  }

  // Edit modal: a plain textarea pre-filled with the current text
  function showEditSlotModal(currentText) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'mp-modal-overlay';
      overlay.innerHTML = `
        <div class="mp-modal-box" style="max-width:480px;">
          <textarea id="edit-slot-textarea" style="width:100%; min-height:120px; padding:10px; font-size:14px; border:1px solid var(--line); border-radius:8px; font-family:inherit; box-sizing:border-box;"></textarea>
          <div class="mp-modal-actions" style="margin-top:12px;">
            <button class="mp-btn mp-btn-ghost" id="edit-cancel">Cancel</button>
            <button class="mp-btn mp-btn-primary" id="edit-save" style="background:#2f6b3e;">Save</button>
          </div>
        </div>`;
      root.appendChild(overlay);
      const ta = overlay.querySelector('#edit-slot-textarea');
      ta.value = currentText; // set via JS, not innerHTML, so no escaping issues
      ta.focus();
      overlay.querySelector('#edit-cancel').addEventListener('click', () => { overlay.remove(); resolve(null); });
      overlay.querySelector('#edit-save').addEventListener('click', () => { const v = ta.value; overlay.remove(); resolve(v); });
    });
  }

  async function handleSlotLongPress(card) {
    const id = card.dataset.id;
    const addedAt = card.dataset.addedAt;
    const order = allOrders.find(o => String(o.id) === String(id));
    if (!order) return;

    const action = await showSlotActionSheet(order);
    if (action === 'edit') {
      const newRaw = await showEditSlotModal(order.raw);
      if (newRaw !== null && newRaw.trim() !== '') {
        const ok = await updateSlotRaw(id, addedAt, newRaw.trim());
        if (ok) {
          order.raw = newRaw.trim();
          loadAndRenderList();
        } else {
          await customAlert('Could not save the edit — try again.');
        }
      }
    } else if (action === 'delete') {
      const confirmed = await customConfirm('Delete this slot? This cannot be undone.');
      if (confirmed) {
        const ok = await deleteSlot(id, addedAt);
        if (ok) {
          loadAndRenderList();
        } else {
          await customAlert('Could not delete — try again.');
        }
      }
    }
  }

  // Toggle a slot green/off on tap, or show Edit/Delete on a long-press (hold ~550ms).
  const inFlightToggles = new Set();
  const whListBody = document.getElementById('wh-list-body');
  let pressTimer = null;
  let pressStartX = 0, pressStartY = 0;
  let longPressFired = false;

  whListBody.addEventListener('pointerdown', (e) => {
    const card = e.target.closest('.mp-order-card');
    if (!card) return;
    longPressFired = false;
    pressStartX = e.clientX;
    pressStartY = e.clientY;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(() => {
      longPressFired = true;
      handleSlotLongPress(card);
    }, 550);
  });

  whListBody.addEventListener('pointermove', (e) => {
    if (!pressTimer) return;
    if (Math.abs(e.clientX - pressStartX) > 12 || Math.abs(e.clientY - pressStartY) > 12) {
      clearTimeout(pressTimer); // moved too much — treat as a scroll, not a press
      pressTimer = null;
    }
  });

  whListBody.addEventListener('pointerup', () => { clearTimeout(pressTimer); pressTimer = null; });
  whListBody.addEventListener('pointercancel', () => { clearTimeout(pressTimer); pressTimer = null; });
  whListBody.addEventListener('contextmenu', (e) => { if (e.target.closest('.mp-order-card')) e.preventDefault(); });

  whListBody.addEventListener('click', async (e) => {
    if (longPressFired) { longPressFired = false; return; } // long-press already handled this interaction
    const card = e.target.closest('.mp-order-card');
    if (!card) return;
    const id = card.dataset.id;
    if (inFlightToggles.has(id)) return; // ignore rapid double-taps on the same slot
    const addedAt = card.dataset.addedAt;
    const order = allOrders.find(o => String(o.id) === String(id));
    if (!order) return;
    const prevState = order.state || 'default';
    if (prevState === 'blue') return; // locked — only clears via marking a product not-done (hand icon), never by tapping
    const newState = nextSlotState(prevState);

    // optimistic UI update — happens instantly, before any network call
    card.classList.remove('state-green', 'state-blue', 'state-red');
    if (newState !== 'default') card.classList.add('state-' + newState);
    order.state = newState;
    inFlightToggles.add(id);

    const ok = await setSlotState(id, addedAt, newState);
    inFlightToggles.delete(id);
    lastToggleCompletedAt = Date.now();
    if (!ok) {
      // revert on failure — and flash the card red briefly so it's visibly
      // clear this specific tap didn't save, not just a silent no-op.
      card.classList.remove('state-green', 'state-blue', 'state-red');
      if (prevState !== 'default') card.classList.add('state-' + prevState);
      order.state = prevState;
      card.classList.add('mp-toggle-failed');
      setTimeout(() => card.classList.remove('mp-toggle-failed'), 900);
    }
  });

  // poll for updates every 4s while on warehouse view. Skip while a toggle is
  // mid-save, AND for a few seconds after one just completed — storage writes
  // can take a moment to be reflected in a fresh read, so polling too soon
  // after a tap can briefly show stale data and make the toggle look like it
  // "un-clicked" before catching up a moment later. This cooldown avoids that.
  let lastToggleCompletedAt = 0;
  const POLL_COOLDOWN_AFTER_TOGGLE_MS = 3000;
  setInterval(() => {
    const cooldownActive = Date.now() - lastToggleCompletedAt < POLL_COOLDOWN_AFTER_TOGGLE_MS;
    if (document.getElementById('view-wh').classList.contains('active') && inFlightToggles.size === 0 && !cooldownActive) {
      loadAndRenderList();
      updateNotCompleteButton();
    }
  }, 4000);

  // ---------- Scan search ----------
  let clearTimer = null;

  function normalize(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  }

  function tokenize(normalized) {
    return normalized.split(' ').filter(Boolean);
  }

  // Common titles that shouldn't affect matching either way — if the scanned
  // label or typed query has "Mr"/"Mrs"/etc. but the stored slot doesn't (or
  // vice versa), that title is just ignored rather than breaking the match.
  const TITLE_WORDS = new Set(['mr', 'mrs', 'ms', 'miss', 'mx', 'dr', 'prof', 'sir', 'madam', 'rev']);
  function stripTitleTokens(tokens) {
    return tokens.filter(t => !TITLE_WORDS.has(t));
  }

  // Names in pick-list style entries are often trimmed (e.g. "Ashford" -> "ashfo"),
  // so a plain substring search misses them. This checks token-by-token, allowing
  // either side to be a prefix of the other — but only when the shorter token is
  // at least 3 characters, so single-letter initials (e.g. "L" in "L J McGil")
  // don't falsely prefix-match longer unrelated query words (e.g. "Lorna").
  function tokenMatches(qt, rt) {
    if (qt === rt) return true;
    if (rt.length >= 3 && qt.length >= rt.length && qt.startsWith(rt)) return true;
    if (qt.length >= 3 && rt.length >= qt.length && rt.startsWith(qt)) return true;
    return false;
  }

  function fuzzyMatch(rawNorm, queryNorm) {
    if (!queryNorm) return false;
    if (rawNorm.includes(queryNorm)) return true;
    const qTokens = stripTitleTokens(tokenize(queryNorm));
    const rTokens = tokenize(rawNorm);
    if (qTokens.length === 0) return false;
    return qTokens.every(qt => rTokens.some(rt => tokenMatches(qt, rt)));
  }

  // If a customer has ordered multiple times (e.g. a weekly repeat), a search
  // matching their name would otherwise surface every past order. Instead,
  // only the single most recent order per distinct customer is kept —
  // different customers who happen to share a matched word stay separate.
  // Results collapsed from more than one historical match are tagged so the
  // popup can flag "this is their latest order" to staff.
  function dedupeMatchesToLatestPerCustomer(matches) {
    const groupsByCustomer = new Map();
    for (const m of matches) {
      const key = normalize(guessCustomerNameFromRaw(m.raw)) || ('~' + m.id);
      if (!groupsByCustomer.has(key)) groupsByCustomer.set(key, []);
      groupsByCustomer.get(key).push(m);
    }
    const results = [];
    for (const group of groupsByCustomer.values()) {
      group.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      const latest = group[0];
      results.push(group.length > 1 ? { ...latest, _hasEarlierOrders: true } : latest);
    }
    return results.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  }

  function searchOrders(query) {
    const q = normalize(query);
    if (!q) return [];
    const matches = allOrders.filter(o => fuzzyMatch(normalize(o.raw), q));
    return dedupeMatchesToLatestPerCustomer(matches);
  }

  // Shows every order on record for the customer on this raw slot, newest
  // first, each as its own readable card — no auto-dismiss timer, just an
  // OK button that returns to the normal Warehouse view.
  function showCustomerHistory(raw) {
    clearTimeout(clearTimer);
    const name = guessCustomerNameFromRaw(raw);
    const nameNorm = normalize(name);
    const history = allOrders
      .filter(o => fuzzyMatch(normalize(o.raw), nameNorm))
      .sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));

    const itemsHtml = history.map(o => `
      <div class="mp-history-item">
        <div class="mp-history-date">${o.addedAt ? formatTimestamp(o.addedAt) : 'Date unknown'}</div>
        ${renderProductLinesHtml(o, 'history')}
      </div>
    `).join('');

    const wrap = document.getElementById('result-wrap');
    wrap.innerHTML = `
      <div class="mp-result-popup" id="history-popup">
        <div class="mp-result-card" style="max-width:640px; text-align:left;">
          <div class="mp-result-name" style="text-align:center;">Previous Orders</div>
          <div class="mp-result-sub" style="text-align:center; margin-top:2px;">${history.length} order(s) found for ${escapeHtml(name)}</div>
          <div class="mp-history-list">${itemsHtml || '<div class="mp-empty">No history found.</div>'}</div>
          <button class="mp-result-ok" id="history-ok-btn">OK</button>
        </div>
      </div>`;

    const popup = document.getElementById('history-popup');
    popup.addEventListener('click', (e) => { if (e.target === popup) resetResult(); });
    document.getElementById('history-ok-btn').addEventListener('click', resetResult);

    popup.querySelectorAll('.mp-product-icon[data-context="history"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const addedAt = btn.dataset.addedAt;
        const productIdx = Number(btn.dataset.productIdx);
        btn.disabled = true;
        const result = await toggleProductNotDone(id, addedAt, productIdx);
        btn.disabled = false;
        if (result !== null) {
          const order = allOrders.find(o => String(o.id) === String(id));
          if (order) order.notDoneProducts = result.notDoneProducts;
          const line = btn.closest('.mp-product-line');
          const isRed = result.notDoneProducts.includes(productIdx);
          line.classList.toggle('mp-product-red', isRed);
          btn.textContent = isRed ? '✅' : '🤚';
          btn.classList.toggle('mp-product-tick', isRed);
          btn.classList.toggle('mp-product-hand', !isRed);
          btn.title = isRed ? 'Mark complete' : 'Mark not done';
          if (result.blueCleared) {
            if (order) order.state = 'default';
            loadAndRenderList(); // reflect the cleared blue on the grid too
          }
        }
      });
    });

    const searchbar = document.querySelector('.mp-wh-searchbar');
    if (searchbar) popup.style.paddingTop = searchbar.getBoundingClientRect().height + 'px';
    const kb = document.getElementById('virtual-keyboard');
    if (kb && kb.style.display !== 'none') {
      popup.style.paddingBottom = kb.getBoundingClientRect().height + 'px';
      kb.classList.add('mp-kb-blackout');
    }
    // deliberately no timer — stays open until OK is tapped
  }

  // Reads the result out loud using the browser's built-in speech synthesis.
  // This is output-only (no microphone involved), so it doesn't hit the same
  // permission wall that blocked voice search earlier.
  // Picks the best-available English female voice from whatever the browser
  // actually provides — voice quality depends on the browser/OS itself
  // (Chrome's Google-branded voices tend to sound more natural than default
  // OS voices), not something that can be fully controlled from here.
  let cachedFemaleVoice = null;
  function pickFemaleVoice() {
    if (cachedFemaleVoice) return cachedFemaleVoice;
    const voices = window.speechSynthesis.getVoices();
    if (!voices || voices.length === 0) return null;
    const english = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
    const pool = english.length ? english : voices;

    const femaleHints = ['female', 'zira', 'samantha', 'victoria', 'karen', 'susan', 'fiona', 'moira', 'tessa', 'serena', 'allison', 'ava', 'emma', 'joanna', 'kimberly', 'salli', 'kendra', 'amy', 'aria', 'jenny'];
    const scored = pool.map(v => {
      const n = v.name.toLowerCase();
      let score = 0;
      if (femaleHints.some(h => n.includes(h))) score += 10;
      if (n.includes('google')) score += 3; // Google's voices tend to sound less robotic than default OS ones
      if (v.localService === false) score += 2; // network-backed voices are usually higher quality
      return { voice: v, score };
    });
    scored.sort((a, b) => b.score - a.score);
    cachedFemaleVoice = scored.length ? scored[0].voice : pool[0];
    return cachedFemaleVoice;
  }

  // Some browsers load the voice list asynchronously — pre-warm it on load
  // so the first search result doesn't fire before voices are ready.
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { cachedFemaleVoice = null; pickFemaleVoice(); };
  }

  // Converts "x" for speech only — the visual display never changes, this is
  // purely how it's read aloud:
  // - dimension-style sizes with no space, like "10x10", "6x6", "7x7",
  //   "12x12" -> "10 bye 10", "6 bye 6", etc.
  // - a space-separated qty suffix, like "x1", "x2" -> "times 1", "times 2".
  // - "ml" straight after a number -> spoken as the letters "M L", not the
  //   word "millilitres" (e.g. "450ml" -> "450 M L").
  // - "oz" straight after a number -> spoken as "ounce" (e.g. "2oz" -> "2 ounce").
  // Order matters: dimensions are converted first (since they rely on no
  // space before the "x"), then the remaining space-separated "x" is
  // converted to "times", then unit abbreviations.
  function convertQtyForSpeech(text) {
    let out = text.replace(/(\d+)x(\d+)/gi, '$1 bye $2');
    out = out.replace(/\bx(\d+)\b/gi, 'times $1');
    out = out.replace(/(\d+)\s*ml\b/gi, '$1 M L');
    out = out.replace(/(\d+)\s*oz\b/gi, '$1 ounce');
    return out;
  }

  function speakResult(matches, query) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel(); // stop anything still being read from a previous scan

    let text;
    if (matches.length === 0) {
      text = 'No match found.';
    } else if (matches.length === 1) {
      // Only the product(s) — no customer name, postcode, or other details.
      // Combined multi-product orders are split into a clear, natural list.
      const items = extractItemsPortion(matches[0].raw);
      const productList = items.split(' + ').map(s => convertQtyForSpeech(s.trim())).filter(Boolean);
      let productText;
      if (productList.length > 1) {
        productText = `There are ${productList.length} products. ` + productList.join('. ') + '.';
      } else {
        productText = productList.join('. ') + '.';
      }
      const lc = matches[0].labelCount;
      const labelText = lc ? `Order has ${lc} label${lc === 1 ? '' : 's'}. ` : '';
      text = labelText + productText;
    } else {
      text = `${matches.length} matches found. Select one order to continue.`;
    }
    const utterance = new SpeechSynthesisUtterance(text);
    const voice = pickFemaleVoice();
    if (voice) utterance.voice = voice;
    utterance.rate = 0.95;   // slightly slower than default — reads less clipped/robotic
    utterance.pitch = 1.05;  // a touch higher, natural for a female voice without sounding cartoonish
    utterance.volume = 1;
    window.speechSynthesis.speak(utterance);
  }

  // Shrinks the popup's --result-scale (starting from full size) step by
  // step until the card's content fits within its own max-height with no
  // overflow — i.e. maximum possible size that still shows everything on
  // one screen, no scrolling, however many products the order has.
  function fitResultCardToViewport(cardEl) {
    if (!cardEl) return;
    let scale = 1;
    const minScale = 0.35;
    cardEl.style.setProperty('--result-scale', '1');
    // Let layout settle at full size first, then shrink in small steps.
    let guard = 0;
    while (cardEl.scrollHeight > cardEl.clientHeight + 2 && scale > minScale && guard < 40) {
      scale = Math.max(minScale, scale - 0.04);
      cardEl.style.setProperty('--result-scale', scale.toFixed(2));
      guard++;
    }
  }

  // For the multi-match list specifically: measures exactly how much the
  // card (title + hint + entries + OK button, at natural size) overflows the
  // popup's actual available height (which already has the search bar/
  // keyboard padding applied), then shrinks ONLY the entries list by that
  // precise amount — rather than guessing a fixed vh value, which was
  // exactly what caused the title to still overflow under the search bar
  // before: a fixed guess doesn't account for the real, current space.
  function fitMultiMatchList(popup) {
    const card = popup.querySelector('.mp-result-card.multi');
    const list = card ? card.querySelector('.mp-multi-entries-list') : null;
    if (!card || !list) return;
    list.style.maxHeight = 'none';
    const available = popup.clientHeight; // already reduced by padding-top/bottom
    const needed = card.scrollHeight;
    if (needed > available) {
      const excess = needed - available;
      const currentListHeight = list.scrollHeight;
      const newHeight = Math.max(70, currentListHeight - excess - 8); // small safety margin
      list.style.maxHeight = newHeight + 'px';
    }
  }

  function showResult(matches, query, isBarcodeScan) {
    const wrap = document.getElementById('result-wrap');
    clearTimeout(clearTimer);
    speakResult(matches, query);

    let cardHtml;
    let duration = 20000;
    const pauseBtnHtml = `<button class="mp-timer-pause-btn" id="timer-pause-btn" title="Pause timer" aria-label="Pause timer">
      <svg viewBox="0 0 24 24" fill="white"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
    </button>`;
    if (matches.length === 0) {
      duration = 5000;
      cardHtml = `
        <div class="mp-result-card none">
          <div class="mp-result-name">No match found</div>
          <div class="mp-result-sub">Searched for "${escapeHtml(query)}"</div>
          <div class="mp-timer-wrap"><div class="mp-timer-bar"><div class="mp-timer-fill" id="timer-fill"></div></div>${pauseBtnHtml}</div>
          <button class="mp-result-ok" id="result-ok-btn">OK</button>
        </div>`;
    } else if (matches.length === 1) {
      const o = matches[0];
      const labelsBox = o.labelCount ? `
        <div class="mp-result-labels-box">
          <div class="mp-result-labels-title">LABELS</div>
          <div class="mp-label-count-badge">${o.labelCount}</div>
        </div>` : '';
      const pauseBtnInlineHtml = `<button class="mp-timer-pause-btn mp-timer-pause-btn-inline" id="timer-pause-btn" title="Pause timer" aria-label="Pause timer">
        <svg viewBox="0 0 24 24" fill="white"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
      </button>`;
      cardHtml = `
        <div class="mp-result-card found">
          ${o._hasEarlierOrders ? '<div class="mp-latest-badge">LATEST ORDER — this customer has ordered before</div>' : ''}
          ${renderProductLinesHtml(o, 'popup')}
          ${labelsBox}
          <div class="mp-datetime-row">${resultTimeBadge(o.addedAt)}${pauseBtnInlineHtml}</div>
          <div class="mp-timer-bar"><div class="mp-timer-fill" id="timer-fill"></div></div>
          ${o._hasEarlierOrders ? '<button class="mp-view-history-btn" id="view-history-btn">VIEW PREVIOUS ORDERS</button>' : ''}
          <button class="mp-result-ok" id="result-ok-btn">OK</button>
        </div>`;
    } else {
      // No timer here — staff need as long as they want to pick the right
      // order. Each entry is clickable (except its own NOT DONE/COMPLETE
      // button) to reopen the popup as a normal single-match view for that
      // one order, with its own timer, OK, and action button as usual.
      cardHtml = `
        <div class="mp-result-card multi">
          <div class="mp-result-name">${matches.length} matches</div>
          <div class="mp-result-sub" style="margin-top:6px;">Tap the order you mean</div>
          <div class="mp-multi-entries-list">
            ${matches.slice(0, 5).map((o, i) => {
              const { header, products } = getDisplayLines(o.raw);
              const headerLine = header ? `<div style="font-weight:800;">${escapeHtml(header)}</div>` : '';
              const productLines = products.map(p => `<div>${escapeHtml(p)}</div>`).join('');
              return `<div class="mp-multi-entry" data-match-index="${i}" style="font-size:16px; border-top:1px solid #e8dfc9; padding-top:8px; margin-top:8px; cursor:pointer;">${o._hasEarlierOrders ? '<div class="mp-latest-badge">LATEST ORDER</div>' : ''}${headerLine}${productLines}${resultTimeBadge(o.addedAt, true)}</div>`;
            }).join('')}
          </div>
          <button class="mp-result-ok" id="result-ok-btn">OK</button>
        </div>`;
    }

    wrap.innerHTML = `<div class="mp-result-popup" id="result-popup">${cardHtml}</div>`;

    const popup = document.getElementById('result-popup');

    // Keep the black overlay covering the FULL screen always (including the
    // space beside the centered keyboard), and just use padding to center the
    // card visually between the search bar and the keyboard — using top/bottom
    // to shrink the overlay itself left gaps beside the keyboard uncovered.
    // This MUST happen before fitResultCardToViewport()/the multi-match list
    // fit below, since they measure available space — doing it after would
    // measure against the wrong (larger, unpadded) area and let content
    // overflow up under the search bar.
    const searchbarEl = document.querySelector('.mp-wh-searchbar');
    if (searchbarEl) popup.style.paddingTop = searchbarEl.getBoundingClientRect().height + 'px';
    const kbEl = document.getElementById('virtual-keyboard');
    if (kbEl && kbEl.style.display !== 'none') {
      popup.style.paddingBottom = kbEl.getBoundingClientRect().height + 'px';
      kbEl.classList.add('mp-kb-blackout');
    }

    fitResultCardToViewport(popup.querySelector('.mp-result-card'));
    fitMultiMatchList(popup);
    popup.addEventListener('click', (e) => { if (e.target === popup) resetResult(); });
    const okBtn = document.getElementById('result-ok-btn');
    if (okBtn) okBtn.addEventListener('click', resetResult);
    const viewHistoryBtn = document.getElementById('view-history-btn');
    if (viewHistoryBtn) viewHistoryBtn.addEventListener('click', () => showCustomerHistory(matches[0].raw));

    // Hand icon (mark not-done) / tick icon (clear) on an individual product
    // line. Clicking either pauses the auto-dismiss timer — same as the
    // pause button — so staff can flag several products in a row without
    // the popup closing on them; they close it themselves via OK when done.
    popup.querySelectorAll('.mp-product-icon[data-context="popup"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        clearTimeout(clearTimer);
        const fillEl = document.getElementById('timer-fill');
        if (fillEl) fillEl.style.animationPlayState = 'paused';
        const pauseBtnEl = document.getElementById('timer-pause-btn');
        if (pauseBtnEl) { pauseBtnEl.disabled = true; pauseBtnEl.style.opacity = '0.4'; }

        const id = btn.dataset.id;
        const addedAt = btn.dataset.addedAt;
        const productIdx = Number(btn.dataset.productIdx);
        btn.disabled = true;
        const result = await toggleProductNotDone(id, addedAt, productIdx);
        btn.disabled = false;
        if (result !== null) {
          const order = allOrders.find(o => String(o.id) === String(id));
          if (order) order.notDoneProducts = result.notDoneProducts;
          const line = btn.closest('.mp-product-line');
          const isRed = result.notDoneProducts.includes(productIdx);
          line.classList.toggle('mp-product-red', isRed);
          btn.textContent = isRed ? '✅' : '🤚';
          btn.classList.toggle('mp-product-tick', isRed);
          btn.classList.toggle('mp-product-hand', !isRed);
          btn.title = isRed ? 'Mark complete' : 'Mark not done';
          if (result.blueCleared) {
            if (order) order.state = 'default';
            loadAndRenderList(); // reflect the cleared blue on the grid too
          }
        }
      });
    });

    // Tapping a multi-match entry (anywhere except its own NOT DONE/COMPLETE
    // button, stopped above) reopens the popup as a normal single-match view
    // for that one order — full detail, its own timer, OK, and action button.
    // If this multi-match came from a barcode scan, selecting an entry also
    // turns THAT one blue (same as a direct single-match scan would) — but
    // only for barcode scans, never for a manually typed search.
    popup.querySelectorAll('.mp-multi-entry').forEach(entry => {
      entry.addEventListener('click', () => {
        const idx = Number(entry.dataset.matchIndex);
        const chosen = matches.slice(0, 5)[idx];
        if (!chosen) return;
        if (isBarcodeScan) markMatchesBlueFromScan([chosen]); // fire-and-forget
        showResult([chosen], query, isBarcodeScan);
      });
    });

    const fill = document.getElementById('timer-fill');
    if (fill) {
      fill.style.animation = `mp-timer-shrink ${duration}ms linear forwards`;
      clearTimer = setTimeout(resetResult, duration);
    }
    const pauseBtn = document.getElementById('timer-pause-btn');
    if (pauseBtn) {
      pauseBtn.addEventListener('click', () => {
        clearTimeout(clearTimer); // stop the auto-close for good
        if (fill) fill.style.animationPlayState = 'paused';
        pauseBtn.disabled = true;
        pauseBtn.style.opacity = '0.4';
      });
    }
  }

  function resetResult() {
    const wrap = document.getElementById('result-wrap');
    wrap.innerHTML = '';
    clearTimeout(clearTimer);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    const kb = document.getElementById('virtual-keyboard');
    if (kb) kb.classList.remove('mp-kb-blackout');
    const input = document.getElementById('scan-input');
    if (input) { input.value = ''; input.focus(); }
  }

  // Some barcode scanners output a full structured label payload (order
  // number, address, SKU, etc.) rather than just a name — e.g.:
  // "[)1.4++...++Tracy Hobson~~UNIT 45...~~GB~~...". The customer name always
  // sits as the first "~~"-separated field in the segment that also contains
  // "GB" (the country code) — a reliable anchor since address line counts
  // vary but the country code doesn't. When this format is detected, only
  // the extracted name is used to search, not the raw payload.
  function looksLikeBarcodeScan(val) {
    return val.startsWith('[)') && val.includes('++') && val.includes('~~');
  }

  function extractNameFromBarcodeScan(raw) {
    const segments = raw.split('++');
    for (const seg of segments) {
      const parts = seg.split('~~');
      if (parts.includes('GB') && parts[0] && parts[0].trim().length > 0) {
        return splitGluedTitle(parts[0].trim());
      }
    }
    return null;
  }

  // Postcode sits immediately before the "GB" country code token in the same
  // segment — a reliable position regardless of how many address lines
  // precede it. Useful as a fallback search when the name field is heavily
  // abbreviated/garbled (e.g. "L Spina (FOODCYCLE)POPOR007212") and wouldn't
  // fuzzy-match the fuller name a slot was actually saved under.
  function extractPostcodeFromBarcodeScan(raw) {
    const segments = raw.split('++');
    for (const seg of segments) {
      const parts = seg.split('~~');
      const gbIdx = parts.indexOf('GB');
      if (gbIdx > 0 && parts[gbIdx - 1] && parts[gbIdx - 1].trim().length > 0) {
        return parts[gbIdx - 1].trim();
      }
    }
    return null;
  }

  // Some labels glue the title straight onto the name with no space (e.g.
  // "MissAmanda P Watts"), which would otherwise stay as one solid token
  // ("missamanda") and slip past the title-stripping used in search matching.
  // This inserts a space after a recognised title when it's immediately
  // followed by another capital letter. Skipped entirely for all-caps
  // strings, since that pattern is common in address fields and would risk
  // false-splitting a genuine surname like "DRURY".
  function splitGluedTitle(name) {
    if (name === name.toUpperCase()) return name;
    const m = name.match(/^(Mr|Mrs|Ms|Miss|Mx|Dr|Prof|Sir|Madam|Rev)(?=[A-Z])/);
    return m ? name.slice(0, m[0].length) + ' ' + name.slice(m[0].length) : name;
  }

  // Matches by name (fuzzy, as usual) OR by postcode (a direct substring
  // check against the normalised order text) — either one finding a hit is
  // enough, so a garbled/abbreviated name doesn't block a postcode match.
  // Barcode scans check TODAY's slots first. If the customer has an order
  // today, that's shown directly — no need to also flag/surface older
  // orders for them. Only if there's no match today does this fall back to
  // searching the full history (with the usual "has earlier orders" flag).
  function searchOrdersByNameOrPostcode(name, postcode) {
    const nameNorm = name ? normalize(name) : '';
    const postcodeNorm = postcode ? normalize(postcode) : '';
    const matchPredicate = (o) => {
      const rawNorm = normalize(o.raw);
      const nameHit = nameNorm && fuzzyMatch(rawNorm, nameNorm);
      const postcodeHit = postcodeNorm && rawNorm.includes(postcodeNorm);
      return nameHit || postcodeHit;
    };

    const todaysMatches = allOrders.filter(o => o.addedAt && isToday(o.addedAt) && matchPredicate(o));
    if (todaysMatches.length > 0) {
      return dedupeMatchesToLatestPerCustomer(todaysMatches);
    }

    const allMatches = allOrders.filter(matchPredicate);
    return dedupeMatchesToLatestPerCustomer(allMatches);
  }

  // Marks the matched slot as scanned — but only when the scan found
  // EXACTLY ONE match (an ambiguous scan matching several different
  // customers doesn't touch anything). For multi-label orders this advances
  // the scan count (partial blue fill) rather than jumping straight to full
  // blue; for single-label orders it goes straight to full blue as before.
  // A red slot is never touched (enforced inside recordScanProgress). Runs
  // in the background so it doesn't delay the popup appearing.
  async function markMatchesBlueFromScan(matches) {
    if (matches.length !== 1) return;
    const o = matches[0];
    if (!o.addedAt) return;
    const result = await recordScanProgress(o.id, o.addedAt, o.labelCount);
    if (result) {
      o.scanCount = result.scanCount;
      if (result.state) o.state = result.state;
      loadAndRenderList(); // refresh the grid so today's match reflects the new progress right away
    }
  }

  async function runSearch(val) {
    if (!val) return;
    allOrders = await getAllOrders(); // refresh before searching
    document.getElementById('wh-count').textContent = allOrders.length;

    if (looksLikeBarcodeScan(val)) {
      const extractedName = extractNameFromBarcodeScan(val);
      const extractedPostcode = extractPostcodeFromBarcodeScan(val);
      const displayVal = extractedName || val;
      scanInput.value = displayVal; // show just the name, not the raw payload
      const matches = searchOrdersByNameOrPostcode(extractedName, extractedPostcode);
      showResult(matches, displayVal, true);
      markMatchesBlueFromScan(matches); // fire-and-forget, doesn't block the popup
      // Clear the box right away (rather than waiting for the popup to time
      // out) so staff can scan the next label immediately.
      scanInput.value = '';
      return;
    }

    const matches = searchOrders(val);
    showResult(matches, val, false);
  }

  const scanInput = document.getElementById('scan-input');
  let typingTimer = null;
  const TYPING_PAUSE_MS = 600; // treat this pause as "typing complete"

  function scheduleAutoSearch() {
    clearTimeout(typingTimer);
    const val = scanInput.value.trim();
    if (!val) return;
    typingTimer = setTimeout(async () => {
      if (scanInput.value.trim() === val) {
        await runSearch(val); // text stays visible — resetResult() clears it once the popup closes
      }
    }, TYPING_PAUSE_MS);
  }

  function triggerImmediateSearch() {
    clearTimeout(typingTimer);
    const val = scanInput.value.trim();
    if (!val) return;
    runSearch(val); // text stays visible — resetResult() clears it once the popup closes
  }

  scanInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') triggerImmediateSearch();
  });

  scanInput.addEventListener('input', scheduleAutoSearch);

  // Type-to-search: whenever Warehouse is the active tab, typing ANYWHERE
  // (without first tapping the search bar or opening the virtual keyboard)
  // gets redirected straight into the search bar and triggers the same
  // live search — like the search box was always focused.
  document.addEventListener('keydown', (e) => {
    const whView = document.getElementById('view-wh');
    if (!whView || !whView.classList.contains('active')) return;
    if (scanInput.disabled) return; // e.g. mid label-extraction

    // Don't hijack typing that's meant for a genuine other input/textarea
    // (the edit-slot box, etc.) or while a modal (confirm/alert/action sheet/
    // edit) is open on top of the view.
    const activeTag = document.activeElement && document.activeElement.tagName;
    if (activeTag === 'TEXTAREA') return;
    if (document.activeElement !== scanInput && activeTag === 'INPUT') return;
    if (document.querySelector('.mp-modal-overlay')) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (document.activeElement === scanInput) return; // already typing normally, let its own handlers run

    if (e.key === 'Enter') {
      if (scanInput.value.trim()) triggerImmediateSearch();
      return;
    }
    if (e.key === 'Backspace') {
      scanInput.focus();
      scanInput.value = scanInput.value.slice(0, -1);
      scheduleAutoSearch();
      e.preventDefault();
      return;
    }
    if (e.key.length === 1) {
      e.preventDefault();
      scanInput.focus();
      scanInput.value += e.key;
      scheduleAutoSearch();
    }
  });

  // ---------- Virtual keyboard ----------
  const VK_ROWS = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['Z','X','C','V','B','N','M']
  ];

  function buildVirtualKeyboard() {
    const panel = document.getElementById('virtual-keyboard');
    const rowsHtml = VK_ROWS.map(row =>
      `<div class="vk-row">${row.map(k => `<button class="vk-key" data-key="${k}">${k}</button>`).join('')}</div>`
    ).join('');
    panel.innerHTML = `
      ${rowsHtml}
      <div class="vk-row">
        <button class="vk-key action" data-action="close">Close</button>
        <button class="vk-key wide" data-key=" ">Space</button>
        <button class="vk-key backspace" data-action="backspace">⌫</button>
        <button class="vk-key" data-action="clear" style="background:#eee;">Clear</button>
        <button class="vk-key search" data-action="search">Search</button>
      </div>`;

    panel.addEventListener('click', (e) => {
      const btn = e.target.closest('.vk-key');
      if (!btn) return;
      resetKeyboardInactivityTimer();
      if (btn.dataset.action === 'close') {
        toggleVirtualKeyboard(false);
        return;
      }
      if (btn.dataset.action === 'clear') {
        scanInput.value = '';
        scanInput.dispatchEvent(new Event('input', { bubbles: true }));
        scanInput.focus();
        return;
      }
      if (btn.dataset.action === 'backspace') {
        scanInput.value = scanInput.value.slice(0, -1);
        scanInput.dispatchEvent(new Event('input', { bubbles: true }));
        scanInput.focus();
        return;
      }
      if (btn.dataset.action === 'search') {
        triggerImmediateSearch();
        scanInput.focus();
        return;
      }
      // letter/number/space key
      scanInput.value += btn.dataset.key;
      scanInput.dispatchEvent(new Event('input', { bubbles: true }));
      scanInput.focus();
    });
  }

  // Auto-closes the virtual keyboard after 5 seconds with no key presses.
  let keyboardInactivityTimer = null;
  const KEYBOARD_INACTIVITY_MS = 5000;
  function resetKeyboardInactivityTimer() {
    clearTimeout(keyboardInactivityTimer);
    keyboardInactivityTimer = setTimeout(() => {
      const panel = document.getElementById('virtual-keyboard');
      if (panel && panel.style.display !== 'none') toggleVirtualKeyboard(false);
    }, KEYBOARD_INACTIVITY_MS);
  }

  function toggleVirtualKeyboard(show) {
    const panel = document.getElementById('virtual-keyboard');
    panel.style.display = show ? 'block' : 'none';
    if (show) {
      scanInput.focus();
      resetKeyboardInactivityTimer();
    } else {
      clearTimeout(keyboardInactivityTimer);
    }

    // if a result popup is currently open, adjust it to the new available space
    const popup = document.getElementById('result-popup');
    if (popup) {
      if (show) {
        popup.style.paddingBottom = panel.getBoundingClientRect().height + 'px';
        panel.classList.add('mp-kb-blackout');
      } else {
        popup.style.paddingBottom = '';
        panel.classList.remove('mp-kb-blackout');
      }
    }
  }

  buildVirtualKeyboard();
  document.getElementById('btn-keyboard').addEventListener('click', () => {
    const panel = document.getElementById('virtual-keyboard');
    toggleVirtualKeyboard(panel.style.display === 'none');
  });

  // ---------- Storage diagnostic ----------
  async function runStorageDiagnostic() {
    const el = document.getElementById('storage-diag');
    if (!el) return;

    // window.storage can attach slightly after this script first runs — retry for a few seconds.
    let attempts = 0;
    while (typeof window.storage === 'undefined' && attempts < 10) {
      await new Promise(r => setTimeout(r, 300));
      attempts++;
    }

    if (typeof window.storage === 'undefined') {
      el.textContent = 'Storage not detected in this view. Try closing and reopening the artifact panel, or reloading the page.';
      el.className = 'mp-diag bad';
      return;
    }

    try {
      const testKey = 'diag-test';
      const testVal = String(Date.now());
      const setRes = await window.storage.set(testKey, testVal, true);
      if (!setRes) throw new Error('set() returned no result');
      const getRes = await window.storage.get(testKey, true);
      if (!getRes || getRes.value !== testVal) throw new Error('read-back value did not match');
      await window.storage.delete(testKey, true);
      el.textContent = 'Storage connected — orders will save normally.';
      el.className = 'mp-diag ok';
    } catch (e) {
      el.textContent = 'Storage detected but a test save failed: ' + (e && e.message ? e.message : 'unknown error') + '. Try reopening the artifact.';
      el.className = 'mp-diag bad';
      console.error('Storage diagnostic failed:', e);
    }
  }
  runStorageDiagnostic();

  // ---------- Back End: search & manage orders ----------
  // Unlike Warehouse's picking-focused search, this shows EVERY matching
  // order (including older duplicates for the same customer, not just the
  // latest) since the point here is finding a specific order to edit or
  // delete, not just the current one to pick. Live — no button needed.
  let backendSearchSeq = 0;
  let backendSearchResultsCache = [];

  async function runBackendSearch(query) {
    const mySeq = ++backendSearchSeq;
    const resultsEl = document.getElementById('backend-search-results');
    const q = query.trim();
    if (!q) { resultsEl.innerHTML = ''; backendSearchResultsCache = []; return; }

    const all = await getAllOrders();
    if (mySeq !== backendSearchSeq) return; // a newer search started while this was loading

    const qNorm = normalize(q);
    const matches = all
      .filter(o => fuzzyMatch(normalize(o.raw), qNorm))
      .sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
    backendSearchResultsCache = matches;

    if (matches.length === 0) {
      resultsEl.innerHTML = '<div class="mp-empty">No matching orders found.</div>';
      return;
    }

    resultsEl.innerHTML = matches.map(o => `
      <div class="mp-search-result-item" data-id="${o.id}" data-added-at="${o.addedAt || ''}">
        ${renderProductLinesHtml(o, 'backend')}
        <div class="mp-search-result-meta">${o.addedAt ? formatTimestamp(o.addedAt) : 'Date unknown'}</div>
        <div class="mp-search-result-actions">
          <button class="mp-search-edit-btn" data-id="${o.id}" data-added-at="${o.addedAt || ''}">Edit</button>
          <button class="mp-search-delete-btn" data-id="${o.id}" data-added-at="${o.addedAt || ''}">Delete</button>
          <button class="mp-search-blue-btn" data-id="${o.id}" data-added-at="${o.addedAt || ''}"${o.state === 'blue' ? ' disabled' : ''}>${o.state === 'blue' ? 'Already Blue' : 'Mark Blue'}</button>
        </div>
      </div>`).join('');
  }

  const backendSearchInput = document.getElementById('backend-search-input');
  let backendSearchDebounce = null;
  backendSearchInput.addEventListener('input', () => {
    clearTimeout(backendSearchDebounce);
    backendSearchDebounce = setTimeout(() => runBackendSearch(backendSearchInput.value), 300);
  });

  document.getElementById('backend-search-results').addEventListener('click', async (e) => {
    const editBtn = e.target.closest('.mp-search-edit-btn');
    const deleteBtn = e.target.closest('.mp-search-delete-btn');
    const blueBtn = e.target.closest('.mp-search-blue-btn');
    const productIcon = e.target.closest('.mp-product-icon[data-context="backend"]');
    if (productIcon) {
      const id = productIcon.dataset.id;
      const addedAt = productIcon.dataset.addedAt;
      const productIdx = Number(productIcon.dataset.productIdx);
      productIcon.disabled = true;
      const result = await toggleProductNotDone(id, addedAt, productIdx);
      productIcon.disabled = false;
      if (result !== null) {
        const order = backendSearchResultsCache.find(o => String(o.id) === String(id));
        if (order) order.notDoneProducts = result.notDoneProducts;
        const line = productIcon.closest('.mp-product-line');
        const isRed = result.notDoneProducts.includes(productIdx);
        line.classList.toggle('mp-product-red', isRed);
        productIcon.textContent = isRed ? '✅' : '🤚';
        productIcon.classList.toggle('mp-product-tick', isRed);
        productIcon.classList.toggle('mp-product-hand', !isRed);
        productIcon.title = isRed ? 'Mark complete' : 'Mark not done';
        if (result.blueCleared && order) order.state = 'default';
      }
    } else if (editBtn) {
      const id = editBtn.dataset.id;
      const addedAt = editBtn.dataset.addedAt;
      const order = backendSearchResultsCache.find(o => String(o.id) === String(id));
      const currentText = order ? order.raw : '';
      const newText = await showEditSlotModal(currentText);
      if (newText !== null && newText.trim() !== '') {
        const ok = await updateSlotRaw(id, addedAt, newText.trim());
        if (ok) {
          runBackendSearch(backendSearchInput.value);
        } else {
          await customAlert('Could not save the edit — try again.');
        }
      }
    } else if (blueBtn) {
      const id = blueBtn.dataset.id;
      const addedAt = blueBtn.dataset.addedAt;
      blueBtn.disabled = true;
      blueBtn.textContent = 'Marking…';
      const ok = await setSlotState(id, addedAt, 'blue');
      if (ok) {
        const order = backendSearchResultsCache.find(o => String(o.id) === String(id));
        if (order) order.state = 'blue';
        blueBtn.textContent = 'Already Blue';
        loadAndRenderList(); // reflect on the grid immediately
      } else {
        blueBtn.disabled = false;
        blueBtn.textContent = 'Mark Blue — try again';
      }
    } else if (deleteBtn) {
      const id = deleteBtn.dataset.id;
      const addedAt = deleteBtn.dataset.addedAt;
      const confirmed = await customConfirm('Delete this order? This cannot be undone.');
      if (confirmed) {
        const ok = await deleteSlot(id, addedAt);
        if (ok) {
          runBackendSearch(backendSearchInput.value);
        } else {
          await customAlert('Could not delete — try again.');
        }
      }
    }
  });

  // initial load — Warehouse is the default tab, and the search bar is
  // focused immediately so staff can start scanning/typing the instant this
  // loads, with no clicks needed at all.
  loadAndRenderList();
  updateNotCompleteButton();
  scanInput.focus();
})();
</script>
