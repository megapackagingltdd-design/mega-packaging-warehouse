  // ---------- Restore from backup ----------
  // Reads a previously-downloaded backup .xlsx back into SLOTS, recreating
  // each order exactly — same text, same picked state, and the exact
  // original date/time if the file has the "Timestamp (ms)" column (added
  // once this restore feature was built). Older backups without that column
  // fall back to reconstructing the timestamp from the Date/Time text
  // columns, which is accurate to the minute rather than the exact second.
  // Restoring is safe to run more than once — orders are matched by their
  // original ID, so anything already present is skipped, never duplicated.
  function parseBackupTimestamp(row) {
    const exact = row['Timestamp (ms)'];
    if (exact && !isNaN(Number(exact))) return Number(exact);
    // Fallback: reconstruct from "DD/MM/YYYY" + "HH:MM" (en-GB format)
    const dateStr = row['Date Added'];
    const timeStr = row['Time Added'];
    if (!dateStr) return null;
    const dParts = String(dateStr).split('/');
    if (dParts.length !== 3) return null;
    const [day, month, year] = dParts.map(Number);
    let hour = 0, minute = 0;
    if (timeStr) {
      const tParts = String(timeStr).split(':');
      hour = Number(tParts[0]) || 0;
      minute = Number(tParts[1]) || 0;
    }
    const d = new Date(year, month - 1, day, hour, minute);
    return isNaN(d.getTime()) ? null : d.getTime();
  }

  async function restoreFromBackupFile(file) {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheetName = wb.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);

    // Group restored rows by the monthly shard they belong to
    const byShard = {};
    let skippedNoDate = 0;
    for (const row of rows) {
      const addedAt = parseBackupTimestamp(row);
      if (!addedAt) { skippedNoDate++; continue; }
      const key = monthKeyFor(addedAt);
      if (!byShard[key]) byShard[key] = [];
      byShard[key].push({
        id: row['ID'] != null ? String(row['ID']) : (addedAt + '-' + Math.random().toString(36).slice(2, 8)),
        raw: String(row['Order Details'] || '').replace(/ \| /g, '\n'),
        addedAt: addedAt,
        state: stateFromLabel(row['Status'])
      });
    }

    let restored = 0, skippedDuplicate = 0;
    for (const key of Object.keys(byShard)) {
      await queueStorageWrite(key, async () => {
        let existing = [];
        try {
          const res = await window.storage.get(key, true);
          if (res && res.value) existing = JSON.parse(res.value);
        } catch (e) { /* no shard yet */ }
        const existingIds = new Set(existing.map(o => String(o.id)));
        const toAdd = byShard[key].filter(o => {
          if (existingIds.has(String(o.id))) { skippedDuplicate++; return false; }
          return true;
        });
        restored += toAdd.length;
        if (toAdd.length > 0) {
          const combined = existing.concat(toAdd);
          await window.storage.set(key, JSON.stringify(combined), true);
        }
      });
    }

    return { restored, skippedDuplicate, skippedNoDate, total: rows.length };
  }

  document.getElementById('btn-restore-backup').addEventListener('click', async () => {
    const input = document.getElementById('restore-input');
    const statusEl = document.getElementById('backup-status-line');
    const file = input.files && input.files[0];
    if (!file) {
      statusEl.textContent = 'Choose a backup .xlsx file first.';
      return;
    }
    const confirmed = await customConfirm(`Restore orders from "${file.name}"? Anything not already in SLOTS will be added back exactly as it was — this won't delete or duplicate anything already present.`);
    if (!confirmed) return;

    statusEl.textContent = 'Restoring backup…';
    try {
      const result = await restoreFromBackupFile(file);
      let msg = `Restored ${result.restored} order(s) from ${result.total} in the file.`;
      if (result.skippedDuplicate > 0) msg += ` ${result.skippedDuplicate} already present, skipped.`;
      if (result.skippedNoDate > 0) msg += ` ${result.skippedNoDate} had no readable date, skipped.`;
      statusEl.textContent = msg;
      input.value = '';
      loadAndRenderList();
    } catch (e) {
      statusEl.textContent = 'Could not restore backup: ' + (e && e.message ? e.message : 'unknown error');
      console.error('Restore failed:', e);
    }
  });

  // ---------- Not complete orders (manually pasted names) ----------
  // This standalone version has no Anthropic API key wired in (putting one
  // directly in browser-downloadable code would be a serious security risk —
  // anyone could extract and misuse it), so instead of reading a screenshot
  // automatically, staff paste the copied names as plain text and this
  // cleans each one the same way the AI version used to: strips a leading
  // title, and drops an obviously-attached PO/reference code whether it's
  // glued directly onto the name or separated by a dash.
  function cleanPastedName(raw) {
    let name = raw.trim();
    if (!name) return '';

    // Drop a parenthetical plus anything glued directly after it with no
    // space, e.g. "L Spina (FOODCYCLE)POPOR007212" -> "L Spina"
    name = name.replace(/\s*\([^)]*\)\S*$/, '').trim();

    // Drop a dash-attached reference/PO code — the bit after " - " with no
    // spaces that looks code-like (contains a digit, or is a long all-caps
    // token), e.g. "Jen Gray - SLTPOJGRAYCULTDAY" -> "Jen Gray". A normal
    // hyphenated surname (rare, usually no spaces around the dash) is left
    // alone since this only matches a full " - " with spaces either side.
    const dashMatch = name.match(/^(.*?)\s+-\s+(\S+)$/);
    if (dashMatch) {
      const trailing = dashMatch[2];
      const looksLikeCode = /\d/.test(trailing) || (trailing === trailing.toUpperCase() && trailing.length >= 6);
      if (looksLikeCode) name = dashMatch[1].trim();
    }

    name = splitGluedTitle(name); // e.g. "MissAmanda" -> "Miss Amanda"
    name = name.replace(/^(Mr|Mrs|Ms|Miss|Mx|Dr|Prof|Sir|Madam|Rev)\s+/i, '').trim();

    return name;
  }

  async function processPastedNames(rawText) {
    const statusEl = document.getElementById('ncomplete-status-line');
    const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
    const cleanNames = lines.map(cleanPastedName).filter(Boolean);

    if (cleanNames.length === 0) {
      statusEl.textContent = 'Paste some names first — one per line.';
      return;
    }

    const oldNames = await getNotCompleteList();
    const oldSet = new Set(oldNames.map(n => n.toLowerCase()));
    const newSet = new Set(cleanNames.map(n => n.toLowerCase()));
    const added = cleanNames.filter(n => !oldSet.has(n.toLowerCase())).length;
    const removed = oldNames.filter(n => !newSet.has(n.toLowerCase())).length;

    await setNotCompleteList(cleanNames);
    statusEl.textContent = `Not complete list updated — ${cleanNames.length} order(s) (${added} added, ${removed} removed since last update).`;
    updateNotCompleteButton();
  }

  document.getElementById('btn-process-ncomplete').addEventListener('click', async () => {
    const textarea = document.getElementById('ncomplete-paste-textarea');
    await processPastedNames(textarea.value);
    textarea.value = '';
  });

  document.getElementById('btn-all-sent').addEventListener('click', async () => {
    const statusEl = document.getElementById('ncomplete-status-line');
    const confirmed = await customConfirm('Mark all orders as sent? This clears the entire "Not complete orders" list.');
    if (!confirmed) return;
    try {
      await setNotCompleteList([]);
      statusEl.textContent = 'All orders marked as sent — the not complete list is now empty.';
      updateNotCompleteButton();
    } catch (e) {
      statusEl.textContent = 'Could not clear the list: ' + (e && e.message ? e.message : 'unknown error');
    }
  });

  // ---------- Custom confirm/alert ----------
  // Native confirm()/alert() are blocked (silently return false / no-op) inside
  // this sandboxed artifact frame, which is why "Clear all" appeared to do nothing.
  // These render an in-app modal instead.
  function customConfirm(message) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'mp-modal-overlay';
      overlay.innerHTML = `
        <div class="mp-modal-box">
          <p>${escapeHtml(message)}</p>
          <div class="mp-modal-actions">
            <button class="mp-btn mp-btn-ghost" id="modal-cancel">Cancel</button>
            <button class="mp-btn mp-btn-danger" id="modal-confirm" style="background:#a33; color:#fff; border:none;">Yes, clear</button>
          </div>
        </div>`;
      root.appendChild(overlay);
      overlay.querySelector('#modal-cancel').addEventListener('click', () => { overlay.remove(); resolve(false); });
      overlay.querySelector('#modal-confirm').addEventListener('click', () => { overlay.remove(); resolve(true); });
    });
  }

  function customAlert(message) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'mp-modal-overlay';
      overlay.innerHTML = `
        <div class="mp-modal-box">
          <p>${escapeHtml(message)}</p>
          <div class="mp-modal-actions">
            <button class="mp-btn mp-btn-primary" id="modal-ok">OK</button>
          </div>
        </div>`;
      root.appendChild(overlay);
      overlay.querySelector('#modal-ok').addEventListener('click', () => { overlay.remove(); resolve(); });
    });
  }

  document.getElementById('btn-clear').addEventListener('click', async () => {
    const ok = await customConfirm("Clear ALL saved orders — not just today's, everything in SLOTS history? This can't be undone.");
    if (!ok) return;
    try {
      const result = await clearAllOrders();
      const remaining = (await getAllOrders()).length;
      if (result.errors.length > 0) {
        document.getElementById('status-line').textContent = `Found ${result.found} storage shard(s), deleted ${result.deleted}, ${result.errors.length} failed. ${remaining} order(s) still remain.`;
        console.error('Clear errors:', result.errors);
      } else {
        document.getElementById('status-line').textContent = `Cleared ${result.deleted} storage shard(s). SLOTS now has ${remaining} order(s).`;
      }
      loadAndRenderList();
    } catch (e) {
      document.getElementById('status-line').textContent = 'Could not clear — ' + (e && e.message ? e.message : 'unknown error');
      console.error(e);
    }
  });

  // ---------- Storage helpers ----------
  // Orders are stored in monthly shards (orders:YYYY-MM) rather than one
  // ever-growing key, so history is kept indefinitely without one key
  // ballooning past storage limits. getAllOrders() reads every shard.
  const STORAGE_PREFIX = 'orders:';

  function monthKeyFor(ts) {
    const d = new Date(ts);
    return STORAGE_PREFIX + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  }

  function isToday(ts) {
    return new Date(ts).toDateString() === new Date().toDateString();
  }

  // All slots added today share ONE monthly storage shard. Tapping several
  // slots quickly fires several read-modify-write operations against that
  // SAME shard — without serializing them, two overlapping writes can race:
  // the second can read stale data before the first finishes saving, silently
  // losing one tap's change (and can trigger the storage backend's own
  // conflict/error handling under concurrent writes to the same key). This
  // queues writes per-key so they always run one at a time, in order.
  const storageWriteQueues = {};
  function queueStorageWrite(key, fn) {
    const prev = storageWriteQueues[key] || Promise.resolve();
    const run = prev.then(fn, fn); // run fn regardless of whether the prior write succeeded
    storageWriteQueues[key] = run.catch(() => {}); // keep the chain alive even on error
    return run;
  }

  async function getAllOrders() {
    try {
      const listRes = await window.storage.list(STORAGE_PREFIX, true);
      const keys = (listRes && listRes.keys) || [];
      const all = [];
      for (const k of keys) {
        try {
          const res = await window.storage.get(k, true);
          if (res && res.value) all.push(...JSON.parse(res.value));
        } catch (e) { /* skip unreadable shard */ }
      }
      all.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      return all;
    } catch (e) {
      return [];
    }
  }

  async function addOrdersToStorage(newOrders) {
    const now = Date.now();
    const stamped = newOrders.map((o, i) => {
      const entry = { raw: o.raw, addedAt: now, id: now + '-' + i };
      if (o.labelCount != null) entry.labelCount = o.labelCount;
      return entry;
    });
    const key = monthKeyFor(now);
    return queueStorageWrite(key, async () => {
      let existing = [];
      try {
        const res = await window.storage.get(key, true);
        if (res && res.value) existing = JSON.parse(res.value);
      } catch (e) { /* no shard yet this month */ }
      const combined = existing.concat(stamped);
      const result = await window.storage.set(key, JSON.stringify(combined), true);
      if (!result) {
        throw new Error('storage.set returned no result for key ' + key);
      }
      return stamped.length;
    });
  }

  async function clearAllOrders() {
    const listRes = await window.storage.list(STORAGE_PREFIX, true);
    const keys = (listRes && listRes.keys) || [];
    let deleted = 0;
    const errors = [];
    for (const k of keys) {
      try {
        const res = await window.storage.delete(k, true);
        if (res) deleted++;
        else errors.push(k + ': delete returned no result');
      } catch (e) {
        errors.push(k + ': ' + (e && e.message ? e.message : 'unknown error'));
      }
    }
    return { found: keys.length, deleted, errors };
  }

  // Cycles a slot's state — default -> green -> default — and
  // persists it in its monthly shard, so the state survives refreshes and
  // shows up on other devices. The actual read-modify-write is queued per
  // shard key (see queueStorageWrite) so tapping several slots quickly never
  // races against the same shard. Retries up to twice more (3 attempts
  // total) with escalating backoff on top of that, since storage.set can
  // still hit transient server errors even one at a time.
  async function setSlotState(id, addedAt, newState) {
    if (!addedAt) return false;
    const key = monthKeyFor(Number(addedAt));
    return queueStorageWrite(key, () => setSlotStateAttempt(key, id, newState, 1));
  }

  async function setSlotStateAttempt(key, id, newState, attempt) {
    try {
      const res = await window.storage.get(key, true);
      if (!res || !res.value) return false;
      const arr = JSON.parse(res.value);
      const idx = arr.findIndex(o => String(o.id) === String(id));
      if (idx === -1) return false;
      arr[idx].state = newState;
      delete arr[idx].done; // retire the old boolean field, state replaces it
      const setRes = await window.storage.set(key, JSON.stringify(arr), true);
      return !!setRes;
    } catch (e) {
      console.error('setSlotState failed (attempt ' + attempt + '):', e);
      if (attempt < 3) {
        await new Promise(r => setTimeout(r, attempt * 500));
        return setSlotStateAttempt(key, id, newState, attempt + 1);
      }
      return false;
    }
  }

  // Marks/unmarks ONE specific product within a slot as "not done" — entirely
  // separate from the whole-slot green pick-cycle. A slot can
  // have any mix of flagged and unflagged products at once. Stored as an
  // array of product-line indices (see getDisplayLines) on the order object.
  // Marking a product not-done (not un-marking it) also clears a locked blue
  // slot back to default — this is the ONLY way blue can be cleared, since
  // tapping the grid is locked out for blue slots entirely.
  async function toggleProductNotDone(id, addedAt, productIdx) {
    if (!addedAt) return null;
    const key = monthKeyFor(Number(addedAt));
    return queueStorageWrite(key, async () => {
      try {
        const res = await window.storage.get(key, true);
        if (!res || !res.value) return null;
        const arr = JSON.parse(res.value);
        const idx = arr.findIndex(o => String(o.id) === String(id));
        if (idx === -1) return null;
        const current = Array.isArray(arr[idx].notDoneProducts) ? arr[idx].notDoneProducts.slice() : [];
        const pos = current.indexOf(productIdx);
        let blueCleared = false;
        if (pos === -1) {
          current.push(productIdx); // newly marking as not-done
          if (arr[idx].state === 'blue') {
            arr[idx].state = 'default';
            blueCleared = true;
          }
        } else {
          current.splice(pos, 1); // un-marking — blue is left as-is
        }
        arr[idx].notDoneProducts = current;
        const setRes = await window.storage.set(key, JSON.stringify(arr), true);
        if (!setRes) return null;
        return { notDoneProducts: current, blueCleared };
      } catch (e) {
        console.error('toggleProductNotDone failed:', e);
        return null;
      }
    });
  }

  // Renders every product on its own line, each with a hand icon (tap to
  // flag as not-done, turns that one line red) or, if already flagged, a
  // green tick instead (tap to clear it back to normal). The header line
  // (customer/postcode/channel), if any, renders once above the products.
  // `context` is a short string namespacing the click handler per view
  // (e.g. "popup", "notcomplete", "grid", "history", "backend") so each
  // view's delegated listener only reacts to its own icons.
  function renderProductLinesHtml(order, context) {
    const { header, products } = getDisplayLines(order.raw);
    const notDone = Array.isArray(order.notDoneProducts) ? order.notDoneProducts : [];
    const headerHtml = header ? `<div class="mp-product-header">${escapeHtml(header)}</div>` : '';
    const productsHtml = products.map((p, i) => {
      const isRed = notDone.includes(i);
      const icon = isRed
        ? `<button class="mp-product-icon mp-product-tick" data-context="${context}" data-id="${order.id}" data-added-at="${order.addedAt || ''}" data-product-idx="${i}" title="Mark complete">✅</button>`
        : `<button class="mp-product-icon mp-product-hand" data-context="${context}" data-id="${order.id}" data-added-at="${order.addedAt || ''}" data-product-idx="${i}" title="Mark not done">🤚</button>`;
      return `<div class="mp-product-line${isRed ? ' mp-product-red' : ''}"><span class="mp-product-text">${escapeHtml(p)}</span>${icon}</div>`;
    }).join('');
    return `<div class="mp-product-block">${headerHtml}${productsHtml}</div>`;
  }

  // For orders with more than one label (o.labelCount > 1), each barcode
  // scan of the same order advances scanCount by one instead of jumping
  // straight to fully blue — e.g. a 2-label order is half blue after the
  // first scan, full blue after the second. Single-label orders (or ones
  // with no labelCount at all) go straight to full blue on the first scan,
  // exactly as before. Persisted, so progress survives reloads. A slot
  // that's currently red is left untouched entirely — red always wins.
  async function recordScanProgress(id, addedAt, labelCount) {
    if (!addedAt) return null;
    const key = monthKeyFor(Number(addedAt));
    return queueStorageWrite(key, async () => {
      try {
        const res = await window.storage.get(key, true);
        if (!res || !res.value) return null;
        const arr = JSON.parse(res.value);
        const idx = arr.findIndex(o => String(o.id) === String(id));
        if (idx === -1) return null;
        if (arr[idx].state === 'red') return null; // red always wins — never overwritten by a scan
        const total = labelCount && labelCount > 1 ? labelCount : 1;
        const current = arr[idx].scanCount || 0;
        const next = Math.min(current + 1, total);
        arr[idx].scanCount = next;
        if (next >= total) {
          arr[idx].state = 'blue'; // fully scanned — same full-blue behaviour as before
        }
        const setRes = await window.storage.set(key, JSON.stringify(arr), true);
        if (!setRes) return null;
        return { scanCount: next, state: arr[idx].state };
      } catch (e) {
        console.error('recordScanProgress failed:', e);
        return null;
      }
    });
  }

  // Red is never entered by tapping — it's only set via the whole-slot
  // history around the per-product not-done icons — but once a slot IS red,
  // tapping it continues forward from there. Blue is locked entirely: the
  // caller (the grid click handler) returns early before ever calling this
  // function if the slot is blue, so blue never reaches here at all — the
  // only way blue clears is by marking a product not-done (see
  // toggleProductNotDone). Yellow has been removed entirely — the tap-cycle
  // is now a simple default <-> green toggle, and any legacy slot that still
  // has state 'yellow' stored is treated as unrecognised and rendered with
  // default styling.
  function nextSlotState(current) {
    if (current === 'red') return 'green';
    if (current === 'green') return 'default';
    return 'green'; // from default (or any other/legacy value, incl. old 'yellow')
  }

  // Updates a slot's raw text (from the edit modal) and persists it.
  // Updates a slot's raw text (from the edit modal). Re-applies the same
  // "(N)" label-count extraction used when orders are first added, so
  // editing "(2)" onto a slot afterward is treated exactly the same as
  // typing it in originally — the bracket is stripped and the badge appears.
  async function updateSlotRaw(id, addedAt, editedRaw) {
    if (!addedAt) return false;
    const { raw: newRaw, labelCount } = extractLabelCount({ raw: editedRaw });
    const key = monthKeyFor(Number(addedAt));
    return queueStorageWrite(key, async () => {
      try {
        const res = await window.storage.get(key, true);
        if (!res || !res.value) return false;
        const arr = JSON.parse(res.value);
        const idx = arr.findIndex(o => String(o.id) === String(id));
        if (idx === -1) return false;
        arr[idx].raw = newRaw;
        if (labelCount != null) arr[idx].labelCount = labelCount;
        else delete arr[idx].labelCount; // "(N)" removed during edit — clear the badge too
        const setRes = await window.storage.set(key, JSON.stringify(arr), true);
        return !!setRes;
      } catch (e) {
        console.error('updateSlotRaw failed:', e);
        return false;
      }
    });
  }

  // Permanently removes a slot from its monthly shard.
  async function deleteSlot(id, addedAt) {
    if (!addedAt) return false;
    const key = monthKeyFor(Number(addedAt));
    return queueStorageWrite(key, async () => {
      try {
        const res = await window.storage.get(key, true);
        if (!res || !res.value) return false;
        const arr = JSON.parse(res.value);
        const filtered = arr.filter(o => String(o.id) !== String(id));
        const setRes = await window.storage.set(key, JSON.stringify(filtered), true);
        return !!setRes;
      } catch (e) {
        console.error('deleteSlot failed:', e);
        return false;
      }
    });
  }

  // ---------- NOT COMPLETE ORDERS list ----------
  // A simple persisted list of names, entirely separate from slot colour —
  // "not complete" here just means "still on the SendCloud labels page as of
  // the last screenshot". Uploading a new screenshot REPLACES this list
  // wholesale (so anything no longer on the page drops off automatically);
  // "All orders sent" clears it manually.
  const NOT_COMPLETE_KEY = 'not-complete-list';

  async function getNotCompleteList() {
    try {
      const res = await window.storage.get(NOT_COMPLETE_KEY, true);
      if (!res || !res.value) return [];
      return JSON.parse(res.value);
    } catch (e) {
      return [];
    }
  }

  async function setNotCompleteList(names) {
    return queueStorageWrite(NOT_COMPLETE_KEY, async () => {
      const setRes = await window.storage.set(NOT_COMPLETE_KEY, JSON.stringify(names), true);
      return !!setRes;
    });
  }

  // ---------- Warehouse list rendering: grouping & colour-coding ----------
  // Mirrors the "Product Group Ordering" rules from packing_slip_rules.md:
  // priority groups first (8ply, 8ply 2,500, 1ply full box), then all other
  // product groups, sorted by qty ascending within each group, with combined
  // "+" multi-product orders always at the very bottom.
  const PRIORITY_GROUPS = ['8ply', '8ply 2,500', '1ply full box'];

  // Same colour palette, deliberately excluding green so it's never confused
  // with the picked/done toggle colour.
  const GROUP_PALETTE = [
    { bg: '#eaf2fb', border: '#a9c9ea' },
    { bg: '#f4eefb', border: '#cbb3ea' },
    { bg: '#fbf6ee', border: '#e0c9a0' },
    { bg: '#fbeef6', border: '#e0a9c9' },
    { bg: '#eefbfa', border: '#a9dfda' },
    { bg: '#f9fbee', border: '#d6e0a9' },
    { bg: '#eeeffb', border: '#a9b0e0' },
    { bg: '#fbf0ee', border: '#e0b3a9' },
    { bg: '#eef7fb', border: '#a9d6ea' },
    { bg: '#f6eefb', border: '#d3a9ea' },
    { bg: '#fbfbee', border: '#dedea9' },
    { bg: '#eefbf3', border: '#a9d9c0' }
  ];

  function hashString(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return h;
  }

  function extractGroupInfo(raw) {
    const itemsPortion = extractItemsPortion(raw);
    if (itemsPortion.includes(' + ')) return { group: null, qty: 0, isCombined: true };
    const m = itemsPortion.match(/^(.*?)\s*x(\d+)\s*$/i);
    if (m) return { group: m[1].trim().toLowerCase(), qty: parseInt(m[2], 10), isCombined: false };
    return { group: itemsPortion.trim().toLowerCase(), qty: 1, isCombined: false };
  }

  function groupPriority(group) {
    const idx = PRIORITY_GROUPS.indexOf(group);
    return idx === -1 ? PRIORITY_GROUPS.length : idx;
  }

  function colorForGroup(group) {
    if (!group) return { bg: '', border: '' }; // combined lines: no tint, just default card styling
    const idx = hashString(group) % GROUP_PALETTE.length;
    return GROUP_PALETTE[idx];
  }

  function sortOrdersByProductGroup(orders) {
    return orders
      .map(o => ({ order: o, info: extractGroupInfo(o.raw) }))
      .sort((a, b) => {
        if (a.info.isCombined !== b.info.isCombined) return a.info.isCombined ? 1 : -1;
        if (a.info.isCombined) return (b.order.addedAt || 0) - (a.order.addedAt || 0);
        const pa = groupPriority(a.info.group), pb = groupPriority(b.info.group);
        if (pa !== pb) return pa - pb;
        if (a.info.group !== b.info.group) return a.info.group.localeCompare(b.info.group);
        if (a.info.qty !== b.info.qty) return a.info.qty - b.info.qty;
        return (b.order.addedAt || 0) - (a.order.addedAt || 0);
      })
      .map(x => ({ ...x.order, _group: x.info.group, _qty: x.info.qty, _isCombined: x.info.isCombined }));
  }

  // ---------- Warehouse list rendering ----------
  // allOrders holds the FULL history — used for search, which has no date
  // limit. The visible grid below only shows today's slots, to keep the
  // day-to-day view uncluttered; older orders are still fully searchable.
  let allOrders = [];

  // Right-side colour for a partial scan-progress fill — mirrors whatever
  // the slot's normal colour would be (its manual green state,
  // or its product-group tint, or plain default), matching how it would look
  // if it hadn't been scanned at all yet.
  function underlyingStateColor(o, groupColor) {
    if (o.state === 'green') return { bg: '#2f6b3e', border: '#2f6b3e' };
    if (groupColor && groupColor.bg) return { bg: groupColor.bg, border: groupColor.border };
    return { bg: '#ffffff', border: '#d8d5cc' };
  }

  function renderOrderCard(o) {
    const color = colorForGroup(o._group);
    const hasPartialScan = o.labelCount > 1 && o.scanCount > 0 && o.scanCount < o.labelCount && o.state !== 'blue';

    let style;
    if (o._possibleCopy) {
      style = ''; // the flashing animation (CSS) fully controls colour — no inline override needed
    } else if (hasPartialScan) {
      const fraction = Math.round((o.scanCount / o.labelCount) * 100);
      const right = underlyingStateColor(o, color);
      style = ` style="background: linear-gradient(to right, #1e6fd9 0%, #1e6fd9 ${fraction}%, ${right.bg} ${fraction}%, ${right.bg} 100%) !important; border-color: ${right.border} !important;"`;
    } else {
      style = color.bg ? ` style="background:${color.bg}; border-color:${color.border};"` : '';
    }

    const labelBadge = o.labelCount ? `<div class="mp-label-count-badge" title="${o.labelCount} labels used">${o.labelCount}</div>` : '';
    const copyWarning = o._possibleCopy ? `<div class="mp-possible-copy-label">POSSIBLE COPY</div>` : '';
    const { header, products } = getDisplayLines(o.raw);
    const notDone = Array.isArray(o.notDoneProducts) ? o.notDoneProducts : [];
    const headerLine = header ? `<div class="mp-card-header-line">${escapeHtml(header)}</div>` : '';
    const productLines = products.map((p, i) => `<div class="mp-card-product-line${notDone.includes(i) ? ' mp-card-product-red' : ''}">${escapeHtml(p)}</div>`).join('');
    return `
      <div class="mp-order-card${o.state === 'green' ? ' state-green' : ''}${o.state === 'blue' ? ' state-blue' : ''}${o.state === 'red' ? ' state-red' : ''}${o._possibleCopy ? ' mp-possible-copy' : ''}" data-id="${o.id}" data-added-at="${o.addedAt || ''}"${style}>
        ${labelBadge}
        ${copyWarning}
        <div class="mp-order-card-main">${headerLine}${productLines}</div>
        <div class="mp-order-card-foot">
          ${o.addedAt ? `<span class="mp-order-time">${formatCardTimeLabel(o.addedAt)}</span>` : '<span></span>'}
          ${o.addedAt && isToday(o.addedAt) ? `<span class="mp-today-badge-sm">${formatTimeOnly(o.addedAt)}</span>` : ''}
        </div>
      </div>`;
  }

  // Groups consecutive slots that share the SAME product AND qty (already
  // sorted together by sortOrdersByProductGroup) into clusters, so a red
  // frame can be drawn around each real group of 2+ matching slots — "8ply x1"
  // and "8ply x2" are always kept as separate clusters, never merged. Any
  // slot that's the only one of its exact product+qty, plus every combined
  // "+" order, is pulled out and collected into one "MIXED" section — now at
  // the very TOP (the whole ordering is flipped end-to-end from how it used
  // to be, MIXED was previously last).
  function clusterOrders(sorted) {
    const rawRuns = [];
    for (const o of sorted) {
      const last = rawRuns[rawRuns.length - 1];
      const key = o._isCombined ? null : (o._group + '::' + o._qty);
      if (key !== null && last && last.key === key) {
        last.items.push(o);
      } else {
        rawRuns.push({ key, group: o._group, qty: o._qty, items: [o] });
      }
    }

    const clusters = [];
    const mixedItems = [];
    for (const run of rawRuns) {
      if (run.key !== null && run.items.length > 1) {
        clusters.push({ framed: true, label: `${run.group} x${run.qty}`, items: run.items });
      } else {
        mixedItems.push(...run.items);
      }
    }
    if (mixedItems.length > 0) {
      mixedItems.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
      clusters.push({ framed: true, label: 'MIXED', items: mixedItems, isMixed: true });
    }
    return clusters.reverse(); // full flip: MIXED to the top, everything else in reverse order below it
  }

  // Finds pairs of today's slots that appear to be the same customer,
  // reusing the same name-matching logic as the Back End duplicate check.
  // Only compares today's slots against each other, not older history.
  // A possible copy now requires EVERY piece of information to match — the
  // full normalised order text (name, products, postcode, everything) —
  // not just the customer name. Two genuinely different orders from the
  // same customer on the same day (different products, etc.) are no longer
  // incorrectly flagged, only true duplicates of the whole order are.
  function findTodaysDuplicateIds(todayOrders) {
    const duplicateIds = new Set();
    for (let i = 0; i < todayOrders.length; i++) {
      const normI = normalize(todayOrders[i].raw);
      for (let j = i + 1; j < todayOrders.length; j++) {
        if (normI === normalize(todayOrders[j].raw)) {
          duplicateIds.add(String(todayOrders[i].id));
          duplicateIds.add(String(todayOrders[j].id));
        }
      }
    }
    return duplicateIds;
  }

  // A short, pleasant chime synthesised on the fly with the Web Audio API —
  // no external sound file needed. Plays once whenever loadAndRenderList
  // detects order IDs that weren't present on the previous refresh (whether
  // added locally or synced in from another device).
  function playNewOrderChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      [880, 1320].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const start = now + i * 0.09;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.22, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.45);
        osc.connect(gain).connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.5);
      });
      setTimeout(() => ctx.close(), 900);
    } catch (e) {
      console.error('Chime failed:', e);
    }
  }

  let knownOrderIds = null; // null until the first load, so we never chime on initial page load
  function checkForNewOrdersAndChime(todayOrders) {
    const currentIds = new Set(todayOrders.map(o => String(o.id)));
    if (knownOrderIds !== null) {
      let hasNew = false;
      for (const id of currentIds) {
        if (!knownOrderIds.has(id)) { hasNew = true; break; }
      }
      if (hasNew) playNewOrderChime();
    }
    knownOrderIds = currentIds;
  }

  async function loadAndRenderList() {
    allOrders = await getAllOrders();
    const todayOrders = allOrders.filter(o => o.addedAt && isToday(o.addedAt));
    checkForNewOrdersAndChime(todayOrders);
    document.getElementById('wh-count').textContent = todayOrders.length;
    const body = document.getElementById('wh-list-inner');
    if (todayOrders.length === 0) {
      body.innerHTML = '<div class="mp-empty">No slots loaded today yet — add some in "Back End". (Older orders are still searchable.)</div>';
      applyWhScrollOffset(); // re-clamp now that content shrank
      return;
    }
    const duplicateIds = findTodaysDuplicateIds(todayOrders);
    todayOrders.forEach(o => { o._possibleCopy = duplicateIds.has(String(o.id)); });

    const sorted = sortOrdersByProductGroup(todayOrders);
    const clusters = clusterOrders(sorted);

    body.innerHTML = clusters.map(cluster => {
      const cardsHtml = cluster.items.map(renderOrderCard).join('');
      const clusterClass = cluster.isMixed ? 'mp-group-cluster mp-group-cluster-mixed' : 'mp-group-cluster';
      return `
        <div class="${clusterClass}">
          <div class="mp-group-cluster-label">${escapeHtml(cluster.label)} — ${cluster.items.length}</div>
          <div class="mp-group-cluster-grid">${cardsHtml}</div>
        </div>`;
    }).join('');
    applyWhScrollOffset(); // preserve scroll position (re-clamped) across re-renders
  }

  // ---------- NOT COMPLETE ORDERS button + list ----------
  async function updateNotCompleteButton() {
    const list = await getNotCompleteList();
    const countEl = document.getElementById('ncomplete-count');
    const btn = document.getElementById('btn-not-complete');
    if (countEl) countEl.textContent = list.length;
    if (btn) btn.style.display = 'flex';
  }

  async function showNotCompleteList() {
    clearTimeout(clearTimer);
    const names = await getNotCompleteList();
    allOrders = await getAllOrders(); // ensure fresh for matching

    // Count how many times each name appears in this screenshot (multiple
    // labels for the same customer), and track which occurrence each row
    // is, so each can be badged "1/2", "2/2" etc. Rows are kept separate,
    // not collapsed.
    const totals = {};
    names.forEach(n => {
      const key = n.trim().toLowerCase();
      totals[key] = (totals[key] || 0) + 1;
    });
    const seenSoFar = {};

    const itemsHtml = names.map(name => {
      const key = name.trim().toLowerCase();

      const nameNorm = normalize(name);

        .filter(o => fuzzyMatch(normalize(o.raw), nameNorm))
        .sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));

      if (match) {
        const stateClass = match.state === 'green' ? ' state-green' : match.state === 'blue' ? ' state-blue' : match.state === 'red' ? ' state-red' : '';
        const timeColorFinal = stateClass ? 'rgba(255,255,255,0.85)' : '#888';

            <div style="display:flex; align-items:center; gap:6px; white-space:nowrap;">
              <span style="font-size:12px; font-weight:700; color:${timeColorFinal};">${match.addedAt ? formatTimestamp(match.addedAt) : ''}</span>
              ${badgeHtml}
            </div>
          </div>
          ${renderProductLinesHtml(match, 'notcomplete')}
        </div>`;
      }
      return `<div class="mp-history-item" style="border-color:#a33;">
        <div style="display:flex; justify-content:space-between; align-items:baseline; gap:10px;">
          <div class="mp-history-date" style="color:#a33;">${escapeHtml(name)}</div>
          ${badgeHtml}
        </div>
